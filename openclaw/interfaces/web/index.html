<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>clipfarmer.bot — Submit a video</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ambient-glow" aria-hidden="true"></div>

  <main class="command-bar">
    <div class="brand">
      <h1>clipfarmer.bot</h1>
      <p class="subtitle">Paste a YouTube URL. We'll turn it into clips and post them for you.</p>
    </div>

    <form id="job-form" class="command-form" novalidate>
      <label for="url" class="visually-hidden">YouTube URL</label>
      <div class="input-row">
        <input
          id="url"
          name="url"
          type="url"
          inputmode="url"
          placeholder="https://www.youtube.com/watch?v=..."
          autocomplete="off"
          required
        />
        <button id="submit-btn" type="submit">Process</button>
      </div>
    </form>

    <p id="message" class="message" role="status" aria-live="polite"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
